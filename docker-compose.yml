services:
  orders-db:
    image: postgres:16-alpine
    container_name: marketplace-orders-db
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data

  products-db:
    image: postgres:16-alpine
    container_name: marketplace-products-db
    environment:
      POSTGRES_DB: products
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - products-db-data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  orders-db-data:
  products-db-data:
  frontend_node_modules:
